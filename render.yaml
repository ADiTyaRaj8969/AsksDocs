services:
  - type: web
    name: askdocs
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: GROQ_API_KEY
        sync: false          # Paste your Groq key (https://console.groq.com/keys) in the Render dashboard
      - key: FIREBASE_PROJECT_ID
        sync: false          # Your Firebase project ID for token verification
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATA_DIR
        value: /app/server/data
      - key: ALLOWED_ORIGINS
        sync: false          # Your Render URL, e.g. https://askdocs.onrender.com
    disk:
      name: askdocs-data
      mountPath: /app/server/data
      sizeGB: 1
